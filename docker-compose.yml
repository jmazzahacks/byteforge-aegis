services:
  aegis:
    image: ghcr.io/jmazzahacks/byteforge-aegis:latest
    container_name: aegis
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:5678:5678"
    # Mount a CA bundle here if your Loki endpoint uses a private/internal CA.
    # volumes:
    #   - /path/to/your-ca.pem:/app/certs/loki-ca.pem:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5678/api/health')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
